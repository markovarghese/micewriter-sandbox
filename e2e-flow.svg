<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 400" font-family="'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="End-to-End Test Flow">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
    <marker id="arrowTeal" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#2dd4bf"/></marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#0b1322"/></linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="400" fill="url(#bgGrad)"/>
  <text x="40" y="40" fill="#e2e8f0" font-size="22" font-weight="700">SystemE2EIT Flow</text>

  <rect x="50" y="150" width="160" height="80" rx="10" fill="#1e293b" stroke="#c084fc" stroke-width="1.5"/>
  <text x="130" y="185" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">SystemE2EIT.java</text>
  <text x="130" y="205" fill="#94a3b8" font-size="10" text-anchor="middle">Maven Failsafe</text>

  <rect x="300" y="80" width="140" height="80" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="370" y="115" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">Sandbox App</text>
  <text x="370" y="135" fill="#94a3b8" font-size="10" text-anchor="middle">Spring Boot</text>

  <rect x="530" y="80" width="140" height="80" rx="10" fill="#1e293b" stroke="#818cf8" stroke-width="1.5"/>
  <text x="600" y="115" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">Engine Sidecar</text>
  <text x="600" y="135" fill="#94a3b8" font-size="10" text-anchor="middle">Rust</text>

  <rect x="760" y="150" width="140" height="80" rx="10" fill="#134e4a" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="830" y="185" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">Apache Nessie</text>
  <text x="830" y="205" fill="#94a3b8" font-size="10" text-anchor="middle">Catalog Verify</text>

  <path d="M180,150 L290,120" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="235" y="130" fill="#94a3b8" font-size="10" text-anchor="middle">POST 1000 events</text>

  <path d="M440,120 L520,120" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="480" y="110" fill="#94a3b8" font-size="10" text-anchor="middle">UDS</text>

  <path d="M670,120 L770,150" fill="none" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <text x="730" y="130" fill="#5eead4" font-size="10" text-anchor="middle">commit</text>

  <path d="M210,210 L750,210" fill="none" stroke="#c084fc" stroke-width="2" marker-dasharray="5,5" marker-end="url(#arrow)"/>
  <text x="480" y="230" fill="#c084fc" font-size="10" text-anchor="middle">Poll for 1000 rows (REST API)</text>
</svg>
