apiVersion: apps/v1
kind: Deployment
metadata:
  name: micewriter-sandbox
  namespace: micewriter-sandbox
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  replicas: 1
  selector:
    matchLabels:
      app: micewriter-sandbox
  template:
    metadata:
      labels:
        app: micewriter-sandbox
      annotations:
        # Prometheus scraping annotations for Grafana Alloy (pointing to Rust engine sidecar)
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8088"
        k8s.grafana.com/scrape: "true"
        k8s.grafana.com/metrics.path: "/metrics"
        k8s.grafana.com/metrics.portNumber: "8088"
        # Pin the scrape to the engine sidecar container. Grafana Alloy's
        # annotation_autodiscovery generates one target per pod container
        # and, when metrics.portNumber is set, rewrites every target's
        # address to that port — so without this filter the engine's
        # /metrics endpoint gets scraped twice (once labeled
        # container=micewriter-engine, once container=sandbox), doubling
        # billable series and the rate() values in PromQL. The
        # `metrics.container` annotation feeds Alloy's `keepequal` rule
        # against the discovered container label and drops the mismatch.
        k8s.grafana.com/metrics.container: "micewriter-engine"
        
        # This label triggers the micewriter-k8s-injector Mutating Webhook.
        # The webhook will inject:
        #   - the micewriter-engine sidecar container
        #   - an emptyDir volume at /var/run/app (shared UDS socket)
        #   - a generic ephemeral PVC at /var/lib/rocksdb (RocksDB cache)
        #   - MINIO_URL and NESSIE_URI environment variables into the sidecar
        iceberg-stream.micewriter.io/inject: "true"

    spec:
      # Pin to k8s-node-3 (laptop, faster CPU) so the load-gen tick loop's
      # rate tracking is not impacted by Rancher / data-lake pods elsewhere.
      nodeSelector:
        kubernetes.io/hostname: k8s-node-3
      # Long enough for the engine sidecar's SIGTERM emergency flush to complete.
      terminationGracePeriodSeconds: 120
      containers:
        - name: sandbox
          image: k8s-node-1.local:5000/micewriter-sandbox:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            # Heap sized for 5 MB payloads at 100 ev/s without GC pauses
            # blowing through the load-gen tick interval.
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms1g -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=50"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          # Deliberately overprovisioned: the sandbox is the load generator,
          # not the system under test. The engine sidecar's limits (set by the
          # injector) stay at their defaults — those are what we are measuring.
          resources:
            requests:
              memory: 2Gi
              cpu: 500m
            limits:
              memory: 3Gi
              # No CPU limit: let the load generator burst to node capacity
              # (k8s-node-3 = 8 vCPU) so producer-side JSON serialization isn't
              # artificially capped. requests.cpu (500m) still drives scheduling.
