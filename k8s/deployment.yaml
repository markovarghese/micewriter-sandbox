apiVersion: apps/v1
kind: Deployment
metadata:
  name: micewriter-sandbox
  namespace: micewriter-sandbox
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  replicas: 1
  selector:
    matchLabels:
      app: micewriter-sandbox
  template:
    metadata:
      labels:
        app: micewriter-sandbox
      annotations:
        # Prometheus scraping annotations for Grafana Alloy.
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
        # NOTE: v1 injected a sidecar via 'iceberg-stream.micewriter.io/inject: "true"'.
        # v2 deletes that path — the SDK now talks gRPC to per-table pipelines
        # installed via micewriter-local-infra/charts/table-pipeline. No sidecar,
        # no UDS volume, no per-pod RocksDB PVC.
    spec:
      # Pin to k8s-node-3 (laptop, faster CPU) so the load-gen tick loop's
      # rate tracking is not impacted by Rancher / data-lake pods elsewhere.
      nodeSelector:
        kubernetes.io/hostname: k8s-node-3
      # v2 in-flight records are buffered on the pipeline, not in the sandbox.
      # The sandbox just needs enough grace for HTTP requests to drain.
      terminationGracePeriodSeconds: 30
      containers:
        - name: sandbox
          image: k8s-node-1.local:5000/micewriter-sandbox:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            # Heap sized for 10 MB payloads at 100 ev/s without GC pauses
            # blowing through the load-gen tick interval.
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms1g -Xmx4g -XX:+UseG1GC -XX:MaxGCPauseMillis=50"
            # Sandbox is in micewriter-sandbox ns; pipelines are in
            # micewriter-infra. The resolver template substitutes {table}.
            - name: MICEWRITER_RESOLVER
              value: "engine-{table}.micewriter-infra.svc:9090"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          # Sandbox is the load generator, not the system under test. The
          # engine pipeline resource budgets (set in the chart values) are
          # what we are measuring.
          resources:
            requests:
              memory: 4Gi
              cpu: 500m
            limits:
              memory: 6Gi
              cpu: "4"
