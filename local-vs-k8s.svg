<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 400" font-family="'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Local vs K8s Architecture">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#0b1322"/></linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="400" fill="url(#bgGrad)"/>
  <text x="40" y="40" fill="#e2e8f0" font-size="22" font-weight="700">Deployment Topology</text>

  <rect x="50" y="80" width="400" height="260" rx="10" fill="#15202f" stroke="#475569" stroke-width="1.5"/>
  <text x="70" y="110" fill="#94a3b8" font-size="14" font-weight="600">Local Development (Host)</text>
  
  <rect x="90" y="140" width="140" height="60" rx="5" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="160" y="170" fill="#e2e8f0" font-size="12" text-anchor="middle">App Process (JVM)</text>

  <rect x="270" y="140" width="140" height="60" rx="5" fill="#1e293b" stroke="#818cf8" stroke-width="1.5"/>
  <text x="340" y="170" fill="#e2e8f0" font-size="12" text-anchor="middle">Engine Process (Rust)</text>

  <rect x="90" y="230" width="320" height="30" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="250" y="250" fill="#94a3b8" font-size="11" text-anchor="middle">/tmp/iceberg.sock</text>

  <rect x="550" y="80" width="400" height="260" rx="10" fill="#15202f" stroke="#475569" stroke-width="1.5"/>
  <text x="570" y="110" fill="#94a3b8" font-size="14" font-weight="600">Kubernetes Pod</text>
  
  <rect x="590" y="140" width="140" height="60" rx="5" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="660" y="170" fill="#e2e8f0" font-size="12" text-anchor="middle">App Container</text>

  <rect x="770" y="140" width="140" height="60" rx="5" fill="#1e293b" stroke="#818cf8" stroke-width="1.5"/>
  <text x="840" y="170" fill="#e2e8f0" font-size="12" text-anchor="middle">Engine Container</text>

  <rect x="590" y="230" width="320" height="30" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="750" y="250" fill="#94a3b8" font-size="11" text-anchor="middle">/var/run/app/iceberg.sock (emptyDir volume)</text>
</svg>
