<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 400" font-family="'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Kubernetes Injection Architecture">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
    <marker id="arrowAccent" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#818cf8"/></marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#0b1322"/></linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="400" fill="url(#bgGrad)"/>
  <text x="40" y="40" fill="#e2e8f0" font-size="22" font-weight="700">Mutating Webhook Injection</text>

  <rect x="100" y="150" width="140" height="80" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="170" y="185" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">API Server</text>
  <text x="170" y="205" fill="#94a3b8" font-size="10" text-anchor="middle">Kubernetes Control Plane</text>

  <rect x="350" y="150" width="160" height="80" rx="10" fill="#1e293b" stroke="#c084fc" stroke-width="1.5"/>
  <text x="430" y="185" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">Injector Webhook</text>
  <text x="430" y="205" fill="#94a3b8" font-size="10" text-anchor="middle">JSON Patch</text>

  <rect x="650" y="100" width="280" height="180" rx="10" fill="#15202f" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="660" y="130" fill="#94a3b8" font-size="12" font-weight="600">Mutated Pod</text>

  <rect x="670" y="150" width="110" height="50" rx="5" fill="#1e293b" stroke="#38bdf8" stroke-width="1"/>
  <text x="725" y="175" fill="#e2e8f0" font-size="12" text-anchor="middle">App Container</text>

  <rect x="800" y="150" width="110" height="50" rx="5" fill="#1e293b" stroke="#818cf8" stroke-width="1"/>
  <text x="855" y="175" fill="#a5b4fc" font-size="12" text-anchor="middle">Engine Sidecar</text>

  <rect x="670" y="220" width="240" height="30" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="790" y="240" fill="#94a3b8" font-size="11" text-anchor="middle">Shared UDS Socket (emptyDir)</text>

  <path d="M240,180 L340,180" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="290" y="170" fill="#94a3b8" font-size="10" text-anchor="middle">AdmissionReview</text>

  <path d="M510,190 L640,190" fill="none" stroke="#c084fc" stroke-width="2" marker-end="url(#arrowAccent)"/>
  <text x="575" y="180" fill="#c084fc" font-size="10" text-anchor="middle">injects sidecar + vols</text>
</svg>
